<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodies - Welcome</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        h1 { font-size: 3.5rem; margin: 10px 0; letter-spacing: 1px; }
        .btn-enter {
            margin-top: 20px;
            padding: 15px 50px;
            background: #FFCC00;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-enter:hover { transform: scale(1.05); }
        .footer-text { position: absolute; bottom: 30px; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="hero">
        <div style="font-size: 60px;">🍔</div>
        <h1>Foodies</h1>
        <a href="signin.html" class="btn-enter">Get Started</a>
        <div class="footer-text">Welcome to Foodies</div>
    </div>
</body>
</html>
